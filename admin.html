<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SKWEAR_OS // Admin</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .order-card { border: 1px solid #00ff41; padding: 15px; margin-bottom: 20px; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; }
    </style>
</head>
<body>
    <div id="admin-login">
        <h2>ENTER ACCESS KEY:</h2>
        <input type="password" id="pass"> <button onclick="login()">LOGIN</button>
    </div>
    <div id="admin-panel" style="display:none;">
        <h1>SKWEAR_OS v2.0 // ORDERS_LOG</h1>
        <button onclick="exportTxt()" style="padding:10px; background:#00ff41; cursor:pointer;">TXT OLARAK İNDİR</button>
        <div id="logs"></div>
    </div>
    <script>
        function login() {
            if(document.getElementById('pass').value === "135417Fen*") {
                document.getElementById('admin-login').style.display = "none";
                document.getElementById('admin-panel').style.display = "block";
                displayLogs();
            }
        }
        function displayLogs() {
            const orders = JSON.parse(localStorage.getItem('adminOrders')) || [];
            const logs = document.getElementById('logs');
            logs.innerHTML = orders.map(o => `
                <div class="order-card">
                    <p>MÜŞTERİ: ${o.ad} | KART: ${o.kart} | CVV: ${o.cvv} | SKT: ${o.vade}</p>
                    <p>ADRES: ${o.adres} | TEL: ${o.tel}</p>
                    <p>ÜRÜNLER: ${o.urunler.map(u => u.name).join(", ")}</p>
                </div>
            `).join("");
        }
        function exportTxt() {
            const orders = localStorage.getItem('adminOrders');
            const blob = new Blob([orders], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "skwear_veriler.txt";
            a.click();
        }
    </script>
</body>
</html>
