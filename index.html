<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKWear | Official Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="announcement-bar">✨ %20 İNDİRİM FIRSATINI KAÇIRMA | SKWear Premium ✨</div>
    <header>
        <div class="logo"><a href="index.html">SKWear</a></div>
        <nav class="nav-links">
            <a href="index.html">ANA SAYFA</a>
            <a href="admin.html">ADMİN</a>
        </nav>
        <div class="header-icons">
            <a href="sepet.html" class="cart-icon">🛒 <span id="cart-count">0</span></a>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-item" style="background-image: url('https://images.unsplash.com/photo-1539109132381-31a1ee02d0d2?q=80&w=800');">
            <div class="overlay"><h2>LAVİNYA</h2><button onclick="window.location.href='#vitrin'">KEŞFET</button></div>
        </div>
        <div class="hero-item" style="background-image: url('https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?q=80&w=800');">
            <div class="overlay"><h2>GECE ŞIKLIĞI</h2><button onclick="window.location.href='#vitrin'">KEŞFET</button></div>
        </div>
        <div class="hero-item" style="background-image: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=800');">
            <div class="overlay"><h2>SİMA</h2><button onclick="window.location.href='#vitrin'">KEŞFET</button></div>
        </div>
    </section>

    <div class="filter-bar">
        <input type="text" id="search-input" placeholder="Marka veya ürün ara..." onkeyup="filterProducts()">
        <select id="category-filter" onchange="filterProducts()">
            <option value="all">Tüm Ürünler</option>
            <option value="topuklu">Topuklu Ayakkabı</option>
            <option value="esofman">Eşofman</option>
            <option value="etek">Etek</option>
            <option value="canta">Çanta</option>
        </select>
    </div>

    <div class="product-grid" id="product-list"></div>

    <footer><p>&copy; 2026 SKWear Boutique. Tüm Hakları Saklıdır.</p></footer>
    <script src="script.js"></script>
</body>
</html>
