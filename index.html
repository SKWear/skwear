<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKWear | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div class="announcement-bar">✨ 500 TL ÜZERİ ÜCRETSİZ KARGO VE ÖZEL İNDİRİMLER ✨</div>

    <header class="main-header">
        <div class="logo">SKWear</div>
        <nav class="navbar">
            <a href="#" onclick="showSection('home')">ANA SAYFA</a>
            <a href="#" onclick="showSection('admin')">ADMİN</a>
        </nav>
        <div class="header-icons">
            <button class="cart-btn" onclick="toggleCart()">
                🛒 <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <section id="home-section" class="active-section">
        <div class="hero-simple">
            <h1>TÜM ÜRÜNLER</h1>
            <p>SKWear kalitesiyle tarzını yansıt.</p>
        </div>
        <div class="product-grid" id="main-product-list">
            </div>
    </section>

    <section id="admin-section" class="hidden-section">
        <div class="admin-container">
            <h2>Ürün Yönetim Paneli</h2>
            <div class="admin-form">
                <input type="text" id="p-name" placeholder="Ürün Adı">
                <input type="number" id="p-price" placeholder="Fiyat (TL)">
                <input type="text" id="p-img" placeholder="Resim Linki (Unsplash vb.)">
                <button onclick="adminAddProduct()" class="admin-add-btn">ÜRÜNÜ SİTEYE EKLE</button>
            </div>
            <div id="admin-product-list"></div>
        </div>
    </section>

    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>SEPETİNİZ</h3>
            <button onclick="toggleCart()" class="close-cart">✕</button>
        </div>
        <div id="cart-items-container"></div>
        <div class="sidebar-footer">
            <div class="total-row"><span>Toplam:</span> <span id="total-price">0</span> TL</div>
            <button class="whatsapp-btn" onclick="checkoutWhatsApp()">WHATSAPP İLE SİPARİŞİ TAMAMLA</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
