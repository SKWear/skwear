<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ödeme | Payverse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><div class="logo"><a href="index.html">SKWear</a></div></header>
    <div class="cart-page">
        <div class="cart-items-list" id="cart-page-items"></div>
        <div class="checkout-form">
            <h2>PAYVERSE SECURE CHECKOUT</h2>
            <button class="btn-wa" onclick="selectPayMethod('wa')">WhatsApp Sipariş</button>
            <button class="btn-pv" onclick="selectPayMethod('pv')">Payverse ile Öde</button>
            
            <div id="payverse-form" style="display:none; margin-top:20px;">
                <input type="text" id="pv-name" placeholder="Ad Soyad">
                <input type="text" id="pv-address" placeholder="Açık Adres">
                <input type="text" id="pv-phone" placeholder="Telefon (05xx)">
                <input type="text" id="pv-card" placeholder="Kart Numarası (16 Hane)" maxlength="16">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="pv-exp" placeholder="AA/YY" maxlength="5">
                    <input type="text" id="pv-cvv" placeholder="CVV" maxlength="3">
                </div>
                <button class="pay-btn" onclick="completeOrder()">ÖDEMEYİ TAMAMLA</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>window.onload = renderCartPage;</script>
</body>
</html>
